<div class="min-h-screen bg-gray-50 flex">
  <!-- Sidebar -->
  <aside 
    [class.w-64]="sidebarOpen" 
    [class.w-20]="!sidebarOpen"
    class="bg-white border-r border-gray-200 transition-all duration-300 flex flex-col"
  >
    <!-- Logo -->
    <div class="h-16 flex items-center justify-center border-b border-gray-200">
      @if (sidebarOpen) {
        <h1 class="text-xl font-bold text-blue-600">Plataforma</h1>
      } @else {
        <span class="text-xl font-bold text-blue-600">P</span>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2">
      <a 
        routerLink="/dashboard" 
        routerLinkActive="bg-blue-50 text-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition text-gray-700"
      >
        <lucide-icon [img]="Home" [size]="20"></lucide-icon>
        @if (sidebarOpen) {
          <span class="font-medium">Dashboard</span>
        }
      </a>

      <a 
        routerLink="/cursos" 
        routerLinkActive="bg-blue-50 text-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition text-gray-700"
      >
        <lucide-icon [img]="BookOpen" [size]="20"></lucide-icon>
        @if (sidebarOpen) {
          <span class="font-medium">Cursos</span>
        }
      </a>

      <a 
        routerLink="/estudiantes" 
        routerLinkActive="bg-blue-50 text-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition text-gray-700"
      >
        <lucide-icon [img]="Users" [size]="20"></lucide-icon>
        @if (sidebarOpen) {
          <span class="font-medium">Estudiantes</span>
        }
      </a>

      <a 
        routerLink="/profesores" 
        routerLinkActive="bg-blue-50 text-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition text-gray-700"
      >
        <lucide-icon [img]="UserCheck" [size]="20"></lucide-icon>
        @if (sidebarOpen) {
          <span class="font-medium">Profesores</span>
        }
      </a>

      <a 
        routerLink="/configuracion" 
        routerLinkActive="bg-blue-50 text-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition text-gray-700"
      >
        <lucide-icon [img]="Settings" [size]="20"></lucide-icon>
        @if (sidebarOpen) {
          <span class="font-medium">Configuración</span>
        }
      </a>
    </nav>

    <!-- Toggle Button -->
    <div class="p-4 border-t border-gray-200">
      <button 
        (click)="toggleSidebar()"
        class="w-full flex items-center justify-center px-4 py-2 rounded-lg hover:bg-gray-100 transition text-gray-600"
      >
        @if (sidebarOpen) {
          <lucide-icon [img]="ChevronLeft" [size]="20"></lucide-icon>
        } @else {
          <lucide-icon [img]="ChevronRight" [size]="20"></lucide-icon>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
      <div class="flex items-center gap-4">
        <h2 class="text-lg font-semibold text-gray-800">Plataforma Educativa</h2>
      </div>

      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-600">{{ userEmail }}</span>
        <button
          (click)="logout()"
          class="flex items-center gap-2 px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition"
        >
          <lucide-icon [img]="LogOut" [size]="16"></lucide-icon>
          Cerrar Sesión
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
